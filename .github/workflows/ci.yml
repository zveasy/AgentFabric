name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check agentfabric tests
      - name: Test
        run: pytest tests -v --tb=short
