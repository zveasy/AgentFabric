apiVersion: v1
kind: ConfigMap
metadata:
  name: agentfabric-config
  namespace: agentfabric
data:
  AGENTFABRIC_DATABASE_URL: postgresql+psycopg://agentfabric:agentfabric@postgres.agentfabric.svc.cluster.local:5432/agentfabric
  AGENTFABRIC_REDIS_URL: redis://redis.agentfabric.svc.cluster.local:6379/0
  AGENTFABRIC_AUTO_MIGRATE: "true"
  AGENTFABRIC_STRICT_SIGNING: "true"
  AGENTFABRIC_QUEUE_MAX_ATTEMPTS: "3"
