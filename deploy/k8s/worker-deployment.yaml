apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentfabric-worker
  namespace: agentfabric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentfabric-worker
  template:
    metadata:
      labels:
        app: agentfabric-worker
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/zveasy/agentfabric:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 150m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom:
            - configMapRef:
                name: agentfabric-config
            - secretRef:
                name: agentfabric-secrets
          command:
            - python
            - -m
            - agentfabric.cli
            - worker-run
            - --database-url
            - $(AGENTFABRIC_DATABASE_URL)
            - --redis-url
            - $(AGENTFABRIC_REDIS_URL)
            - --queue-name
            - default
