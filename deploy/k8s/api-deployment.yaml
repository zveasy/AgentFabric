apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentfabric-api
  namespace: agentfabric
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentfabric-api
  template:
    metadata:
      labels:
        app: agentfabric-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: ghcr.io/zveasy/agentfabric:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          envFrom:
            - configMapRef:
                name: agentfabric-config
            - secretRef:
                name: agentfabric-secrets
          command:
            - python
            - -m
            - agentfabric.cli
            - api-run
            - --database-url
            - $(AGENTFABRIC_DATABASE_URL)
            - --redis-url
            - $(AGENTFABRIC_REDIS_URL)
            - --jwt-secret
            - $(AGENTFABRIC_JWT_SECRET)
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
